# This is a partial template. It contains only the coordinator client configurations.
# It should be complimented by the common load generator configuration.

coordinator-client:
  endpoints:
    - {{ .Endpoints.Coordinator.Server }}
  tls:
    mode: {{ .ClientCreds.Mode }}
    key-path: {{ .ClientCreds.KeyPath }}
    cert-path: {{ .ClientCreds.CertPath }}
    ca-cert-paths:
      {{- range .ClientCreds.CACertPaths }}
      - {{ . }}
      {{- end }}
